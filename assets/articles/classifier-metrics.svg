<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 290" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="380" height="290" fill="#ffffff"/>

  <!-- Axis titles -->
  <text x="240" y="34" text-anchor="middle" font-size="20" font-weight="600" fill="#111111">Predicted</text>
  <text x="40" y="170" text-anchor="middle" font-size="20" font-weight="600" fill="#111111" transform="rotate(-90 40 170)">Actual</text>

  <!-- Column headers -->
  <text x="190" y="74" text-anchor="middle" font-size="17" fill="#111111">Positive</text>
  <text x="290" y="74" text-anchor="middle" font-size="17" fill="#111111">Negative</text>

  <!-- Row headers -->
  <text x="128" y="136" text-anchor="end" font-size="17" fill="#111111">Positive</text>
  <text x="128" y="216" text-anchor="end" font-size="17" fill="#111111">Negative</text>

  <!-- Grid -->
  <g fill="none" stroke="#111111" stroke-width="2">
    <rect x="140" y="90" width="200" height="160"/>
    <line x1="240" y1="90" x2="240" y2="250"/>
    <line x1="140" y1="170" x2="340" y2="170"/>
  </g>

  <!-- Cells -->
  <g text-anchor="middle" font-size="26" font-weight="700" fill="#111111">
    <text x="190" y="139">TP</text>
    <text x="290" y="139">FN</text>
    <text x="190" y="219">FP</text>
    <text x="290" y="219">TN</text>
  </g>
</svg>
